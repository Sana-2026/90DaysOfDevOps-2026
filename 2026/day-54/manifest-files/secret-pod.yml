apiVersion: v1
kind: Pod
metadata:
  name: secret-demo-pod
spec: 
  containers:
    - name: app-container
      image: busybox
      command: ["/bin/sh", "-c", "echo The DB_USER=$DB_USER && sleep 3600"]
      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER
      volumeMounts:
        - name: secret-volume
          mountPath: "/etc/db-credentials"
          readOnly: true
  volumes:
    - name: secret-volume
      secret:
        secretName: db-credentials
